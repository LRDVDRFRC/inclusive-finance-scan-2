<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code-V · Persoonlijk Self-Assessment Inclusief Financieren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --aubergine: #2E1A47;
      --lila: #9678D3;
      --lila-light: #b9a4e0;
      --grey: #F2F2F2;
      --green: #D0DBBB;
      --green-dark: #6B9B37;
      --terracotta: #D35D54;
      --orange: #C06B00;
      --white: #FFFFFF;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--grey);
      color: var(--aubergine);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Progress bar ── */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--lila), var(--terracotta));
      transition: width .5s ease;
      z-index: 100;
    }

    .scan-container {
      width: 100%;
      max-width: 680px;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(46,26,71,.08);
      opacity: 0;
      transform: translateY(30px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .card.active { opacity: 1; transform: translateY(0); }
    .card.exit { opacity: 0; transform: translateY(-30px); }
    .card.hidden { display: none; }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--aubergine);
      margin-bottom: .5rem;
    }
    .logo span { color: var(--lila); }

    .welcome h1 {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1rem;
    }
    .welcome p, .intro-text {
      font-size: .95rem;
      line-height: 1.7;
      color: #555;
      margin-bottom: 1.25rem;
    }

    .section-label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--lila);
      margin-bottom: .75rem;
    }
    h2 { font-size: 1.35rem; margin-bottom: .75rem; }
    h3 { font-size: 1.1rem; margin-bottom: .5rem; }

    /* ── Highlight boxes ── */
    .highlight-box {
      background: linear-gradient(135deg, var(--aubergine), #4a2d6e);
      color: var(--white);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      font-size: .9rem;
      line-height: 1.6;
    }
    .highlight-box strong { color: var(--lila-light); font-size: 1.1rem; }

    /* ── Competency chips ── */
    .competency-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1.25rem;
    }
    .competency-chip {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .35rem .75rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 500;
      background: rgba(150,120,211,.08);
      color: var(--aubergine);
    }

    /* ── Forms ── */
    .form-group { text-align: left; margin-bottom: .85rem; }
    .form-group label { display: block; font-size: .78rem; font-weight: 500; color: #666; margin-bottom: .3rem; }
    .form-group input {
      width: 100%;
      padding: .65rem .9rem;
      border: 2px solid #e8e4ee;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: .88rem;
      color: var(--aubergine);
      transition: border-color .2s;
    }
    .form-group input:focus { outline: none; border-color: var(--lila); }

    .returning-banner {
      background: linear-gradient(135deg, #6B9B37, #8ab85a);
      color: var(--white);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      font-size: .85rem;
      line-height: 1.6;
      display: none;
    }
    .returning-banner.visible { display: block; }
    .returning-banner strong { color: #e8f5d8; }

    /* ── Pillar intro ── */
    .pillar-intro { text-align: left; }
    .pillar-header {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1rem;
    }
    .pillar-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      border-radius: 50%;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .pillar-header-text h2 { margin-bottom: .1rem; font-size: 1.25rem; }
    .pillar-header-text .pillar-sub {
      font-size: .82rem;
      font-weight: 500;
      margin: 0;
      color: #888;
    }
    .pillar-intro .intro-text { font-size: .9rem; margin-bottom: 1rem; }

    .module-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .4rem .8rem;
      border-radius: 8px;
      font-size: .78rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    /* ── Question ── */
    .question-meta {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1rem;
      font-size: .78rem;
      color: var(--lila);
      font-weight: 500;
      flex-wrap: wrap;
    }
    .question-meta .pill {
      background: rgba(150,120,211,.12);
      padding: .2rem .65rem;
      border-radius: 20px;
    }
    .question-meta .comp-pill {
      padding: .2rem .65rem;
      border-radius: 20px;
      font-size: .72rem;
    }
    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: .75rem;
    }

    /* ── Horizontal dot scale ── */
    .scale-wrap {
      margin-bottom: .5rem;
    }
    .scale-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: .5rem;
      font-size: .72rem;
      color: #999;
      font-weight: 500;
    }
    .scale-track {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      height: 56px;
    }
    .scale-track::before {
      content: '';
      position: absolute;
      left: 6px; right: 6px;
      top: 50%;
      transform: translateY(-50%);
      height: 3px;
      background: #e8e4ee;
      border-radius: 2px;
      z-index: 0;
    }
    .scale-dot {
      position: relative;
      z-index: 1;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 3px solid #d4cde0;
      background: var(--white);
      cursor: pointer;
      transition: all .25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      font-weight: 600;
      color: #bbb;
      font-family: 'Poppins', sans-serif;
    }
    .scale-dot:hover {
      border-color: var(--lila);
      color: var(--lila);
      transform: scale(1.1);
    }
    .scale-dot.selected {
      border-color: var(--lila);
      background: var(--lila);
      color: var(--white);
      transform: scale(1.15);
      box-shadow: 0 3px 12px rgba(150,120,211,.35);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .8rem 1.75rem;
      border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s ease;
    }
    .btn-primary { background: var(--aubergine); color: var(--white); }
    .btn-primary:hover { background: #3d2560; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(46,26,71,.25); }
    .btn-primary:disabled { background: #b0a3c0; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { background: transparent; color: var(--lila); font-weight: 500; padding: .8rem .75rem; }
    .btn-secondary:hover { color: var(--aubergine); }
    .btn-cta { background: var(--terracotta); color: var(--white); }
    .btn-cta:hover { background: #c04e44; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(211,93,84,.3); }
    .btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.75rem; }

    /* ── Results ── */
    .results-header { text-align: center; margin-bottom: 1.5rem; }
    .results-header h1 { font-size: 1.5rem; margin-bottom: .5rem; }
    .results-header p { font-size: .88rem; color: #666; line-height: 1.6; }

    .overall-circle {
      width: 120px; height: 120px;
      border-radius: 50%;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 2rem;
      color: var(--white);
      margin: 1rem auto;
      background: linear-gradient(135deg, var(--aubergine), #4a2d6e);
      box-shadow: 0 6px 24px rgba(46,26,71,.25);
    }
    .overall-circle small {
      font-size: .6rem;
      font-weight: 400;
      opacity: .85;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: .15rem;
    }
    .overall-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--aubergine);
      margin-bottom: 1.5rem;
    }

    .comp-result {
      padding: .85rem 0;
      border-bottom: 1px solid #eee;
    }
    .comp-result:last-child { border-bottom: none; }
    .comp-result-header {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: .5rem;
    }
    .comp-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .comp-result-info { flex: 1; }
    .comp-result-name { font-weight: 600; font-size: .82rem; }
    .comp-result-module { font-size: .7rem; color: #999; margin-top: .1rem; }
    .comp-result-score { font-weight: 700; font-size: .9rem; min-width: 40px; text-align: right; }

    .comp-bar-track {
      width: 100%; height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
      margin-top: .4rem;
    }
    .comp-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease .3s;
      width: 0;
    }

    .comp-tip {
      background: var(--grey);
      border-radius: 10px;
      padding: .75rem 1rem;
      margin-top: .5rem;
      font-size: .8rem;
      line-height: 1.55;
      color: #555;
    }
    .comp-tip strong { color: var(--aubergine); }

    .result-insight {
      background: linear-gradient(135deg, var(--aubergine), #4a2d6e);
      color: var(--white);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-top: 1rem;
      font-size: .82rem;
      line-height: 1.7;
    }
    .result-insight strong { color: var(--lila-light); }

    .saved-notice {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: rgba(107,155,55,.1);
      border-radius: 10px;
      padding: .75rem 1rem;
      margin-top: 1rem;
      font-size: .8rem;
      color: var(--green-dark);
      font-weight: 500;
    }

    /* ── Delta / Eindmeting results ── */
    .delta-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .delta-header h1 { font-size: 1.5rem; margin-bottom: .5rem; }

    .delta-overall {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      margin: 1.25rem 0;
      flex-wrap: wrap;
    }
    .delta-score-block {
      text-align: center;
    }
    .delta-score-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--white);
      margin-bottom: .3rem;
    }
    .delta-score-circle small {
      font-size: .55rem;
      font-weight: 400;
      opacity: .85;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .delta-score-label {
      font-size: .75rem;
      font-weight: 500;
      color: #888;
    }
    .delta-arrow {
      font-size: 1.8rem;
      color: var(--lila);
    }
    .delta-badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .4rem .9rem;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: 700;
    }
    .delta-badge.positive {
      background: rgba(107,155,55,.12);
      color: var(--green-dark);
    }
    .delta-badge.neutral {
      background: rgba(150,120,211,.1);
      color: var(--lila);
    }
    .delta-badge.negative {
      background: rgba(211,93,84,.1);
      color: var(--terracotta);
    }

    .comp-delta-result {
      padding: 1rem 0;
      border-bottom: 1px solid #eee;
    }
    .comp-delta-result:last-child { border-bottom: none; }

    .comp-delta-header {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: .6rem;
    }
    .comp-delta-info { flex: 1; }
    .comp-delta-name { font-weight: 600; font-size: .82rem; }
    .comp-delta-module { font-size: .7rem; color: #999; margin-top: .1rem; }
    .comp-delta-badge {
      font-size: .8rem;
      font-weight: 700;
      min-width: 48px;
      text-align: right;
    }

    .dual-bar-wrap { margin-top: .3rem; }
    .dual-bar-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: .3rem;
    }
    .dual-bar-label {
      font-size: .65rem;
      font-weight: 500;
      color: #999;
      width: 60px;
      text-align: right;
      flex-shrink: 0;
    }
    .dual-bar-track {
      flex: 1;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
    }
    .dual-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease .3s;
      width: 0;
    }
    .dual-bar-fill.before { opacity: .35; }
    .dual-bar-value {
      font-size: .75rem;
      font-weight: 600;
      min-width: 32px;
    }

    .growth-highlight {
      background: linear-gradient(135deg, #6B9B37, #8ab85a);
      color: var(--white);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-top: 1.25rem;
      font-size: .85rem;
      line-height: 1.6;
    }
    .growth-highlight strong { color: #e8f5d8; }

    .comp-delta-feedback {
      background: var(--grey);
      border-radius: 10px;
      padding: .75rem 1rem;
      margin-top: .5rem;
      font-size: .8rem;
      line-height: 1.55;
      color: #555;
    }
    .comp-delta-feedback strong { color: var(--aubergine); }

    /* ── Feedback questions (eindmeting only) ── */
    .feedback-option {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .7rem 1rem;
      border: 2px solid #e8e4ee;
      border-radius: 12px;
      background: var(--white);
      font-family: 'Poppins', sans-serif;
      font-size: .85rem;
      color: var(--aubergine);
      cursor: pointer;
      transition: all .2s ease;
      margin-bottom: .5rem;
    }
    .feedback-option:hover { border-color: var(--lila); background: rgba(150,120,211,.04); }
    .feedback-option.selected { border-color: var(--lila); background: rgba(150,120,211,.1); }
    .feedback-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid #d4cde0;
      flex-shrink: 0;
      transition: all .2s ease;
    }
    .feedback-option.selected .feedback-dot {
      border-color: var(--lila);
      background: var(--lila);
      box-shadow: inset 0 0 0 3px var(--white);
    }

    /* ── CTA section ── */
    .cta-section { text-align: center; margin-top: 1.75rem; padding-top: 1.25rem; border-top: 1px solid #eee; }
    .cta-section h3 { font-size: 1.05rem; margin-bottom: .4rem; }
    .cta-section p { font-size: .82rem; color: #666; margin-bottom: 1.1rem; line-height: 1.6; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .scan-container { padding: 1.5rem 1rem; }
      .card { padding: 1.75rem 1.25rem; }
      .welcome h1 { font-size: 1.35rem; }
      .scale-dot { width: 48px; height: 48px; font-size: .82rem; }
      .delta-overall { gap: .75rem; }
      .delta-score-circle { width: 68px; height: 68px; font-size: 1.3rem; }
      .overall-circle { width: 100px; height: 100px; font-size: 1.7rem; }
    }
  </style>
</head>

<div class="progress-bar" id="progressBar"></div>
<div class="scan-container" id="app"></div>

const TOTAL_STATEMENTS = COMPETENCIES.reduce((s, c) => s + c.statements.length, 0); // 22

const SCORE_LABELS = [
  { max: 30, label: 'Beginnend' },
  { max: 50, label: 'Bewust wordend' },
  { max: 70, label: 'Op weg' },
  { max: 85, label: 'Gevorderd' },
  { max: 100, label: 'Ambassadeur' },
];

function getScoreLabel(pct) {
  for (const s of SCORE_LABELS) {
    if (pct <= s.max) return s.label;
  }
  return 'Ambassadeur';
}

function getTipLevel(pct) {
  if (pct <= 40) return 'low';
  if (pct <= 70) return 'mid';
  return 'high';
}

function getDeltaLevel(delta) {
  if (delta > 0) return 'positive';
  if (delta < 0) return 'negative';
  return 'neutral';
}

/* ══════════════════════════════════════
   STATE
   ══════════════════════════════════════ */
let userName = '';
let userEmail = '';
let isEindmeting = false;
let existingData = null;

const answers = {}; // key: 'compIdx-stmtIdx', value: 1-5
const feedbackAnswers = {}; // 'q0', 'q1'

let currentStep = 0;

// Total steps: welcome(1) + identify(1) + (comp intro + comp statements)*5 + results(1) [+ feedback(2) for eindmeting]
function getTotalSteps() {
  let total = 2; // welcome + identify
  for (const comp of COMPETENCIES) {
    total += 1 + comp.statements.length; // intro + statements
  }
  if (isEindmeting) total += 2; // 2 feedback questions
  total += 1; // results
  return total;
}

/* ══════════════════════════════════════
   HELPERS
   ══════════════════════════════════════ */
const app = document.getElementById('app');
const bar = document.getElementById('progressBar');

function updateProgress() {
  bar.style.width = `${(currentStep / getTotalSteps()) * 100}%`;
}

function transition(buildNext) {
  const current = app.querySelector('.card');
  if (current) {
    current.classList.remove('active');
    current.classList.add('exit');
    setTimeout(() => {
      app.innerHTML = '';
      buildNext();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      requestAnimationFrame(() => {
        const card = app.querySelector('.card');
        if (card) { card.classList.remove('hidden'); requestAnimationFrame(() => card.classList.add('active')); }
      });
    }, 300);
  } else {
    buildNext();
    requestAnimationFrame(() => {
      const card = app.querySelector('.card');
      if (card) { card.classList.remove('hidden'); requestAnimationFrame(() => card.classList.add('active')); }
    });
  }
}

function storageKey(email) {
  return 'codev-scan2-' + email.toLowerCase().trim();
}

function loadExistingData(email) {
  try {
    const raw = localStorage.getItem(storageKey(email));
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData() {
  const scores = calculateScores();
  const key = storageKey(userEmail);
  let data = loadExistingData(userEmail) || { name: userName, email: userEmail };
  data.name = userName;

  const measurement = {
    date: new Date().toISOString(),
    answers: { ...answers },
    scores: scores,
  };

  if (isEindmeting) {
    measurement.feedback = { ...feedbackAnswers };
    data.eindmeting = measurement;
  } else {
    data.nulmeting = measurement;
  }

  localStorage.setItem(key, JSON.stringify(data));
  return data;
}

function calculateScores() {
  const compScores = [];
  for (let ci = 0; ci < COMPETENCIES.length; ci++) {
    const comp = COMPETENCIES[ci];
    let sum = 0;
    let count = 0;
    for (let si = 0; si < comp.statements.length; si++) {
      const val = answers[`${ci}-${si}`];
      if (val) { sum += val; count++; }
    }
    const avg = count > 0 ? sum / count : 0;
    const pct = Math.round(((avg - 1) / 4) * 100); // 1-5 mapped to 0-100
    compScores.push({ id: comp.id, avg, pct, label: getScoreLabel(pct) });
  }
  const overallPct = Math.round(compScores.reduce((s, c) => s + c.pct, 0) / compScores.length);
  return { competencies: compScores, overall: overallPct, overallLabel: getScoreLabel(overallPct) };
}

// Count how many statements have been answered so far
function getAnsweredCount() {
  return Object.keys(answers).length;
}

// Get the global statement index for a given comp + statement index
function getGlobalStatementIndex(ci, si) {
  let idx = 0;
  for (let i = 0; i < ci; i++) {
    idx += COMPETENCIES[i].statements.length;
  }
  return idx + si;
}

function onIdentifyInput() {
  const name = document.getElementById('nameInput').value.trim();

  const btn = document.getElementById('identifyNext');
  const banner = document.getElementById('returningBanner');

  const valid = name.length >= 2 && email.includes('@') && email.includes('.');
  btn.disabled = !valid;

  // Check for existing nulmeting
  if (valid) {
    const existing = loadExistingData(email);
    if (existing && existing.nulmeting) {
      banner.classList.add('visible');
      isEindmeting = true;
      existingData = existing;
    } else {
      banner.classList.remove('visible');
      isEindmeting = false;
      existingData = null;
    }

function onIdentifySubmit() {
  userName = document.getElementById('nameInput').value.trim();
  userEmail = document.getElementById('emailInput').value.trim();
  const existing = loadExistingData(userEmail);
  if (existing && existing.nulmeting) {
    isEindmeting = true;
    existingData = existing;
  } else {
    isEindmeting = false;
    existingData = null;

  showCompetencyIntro(0);
}

function getStepForCompIntro(ci) {
  let step = 2; // welcome + identify
  for (let i = 0; i < ci; i++) {

}

/* ══════════════════════════════════════
   4. STATEMENTS (one at a time)
   ══════════════════════════════════════ */
function getStepForStatement(ci, si) {
  return getStepForCompIntro(ci) + 1 + si;
}

function showStatement(ci, si) {
  const comp = COMPETENCIES[ci];
  const stmt = comp.statements[si];
  const globalIdx = getGlobalStatementIndex(ci, si) + 1;
  const answerKey = `${ci}-${si}`;
  const currentAnswer = answers[answerKey] || null;

  currentStep = getStepForStatement(ci, si);
  updateProgress();

  const prevAction = si === 0
    ? `showCompetencyIntro(${ci})`
    : `showStatement(${ci}, ${si - 1})`;

  transition(() => {
    app.innerHTML = `
      <div class="card hidden">
        <div class="question-meta">
          <span class="pill">Stelling ${globalIdx} / ${TOTAL_STATEMENTS}</span>
          <span class="comp-pill" style="background:${comp.color}15;color:${comp.color}">${comp.icon} ${comp.title}</span>
        </div>
        <p class="question-text">“${stmt}”</p>
        <div class="scale-wrap">
          <div class="scale-labels">
            <span>Helemaal niet</span>
            <span>Volledig</span>
          </div>
          <div class="scale-track">
            ${[1,2,3,4,5].map(v => `
              <div class="scale-dot${currentAnswer === v ? ' selected' : ''}"
                   data-value="${v}"
                   onclick="selectAnswer(${ci}, ${si}, ${v}, this)">${v}</div>
            `).join('')}
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="${prevAction}">← Terug</button>
          <span></span>
        </div>
      </div>`;
  });
}

function selectAnswer(ci, si, value, dotEl) {
  answers[`${ci}-${si}`] = value;

  // Visual feedback
  document.querySelectorAll('.scale-dot').forEach(d => d.classList.remove('selected'));
  dotEl.classList.add('selected');

  // Auto-advance after 350ms
  setTimeout(() => {
    advanceFromStatement(ci, si);
  }, 350);
}

function advanceFromStatement(ci, si) {
  const comp = COMPETENCIES[ci];
  if (si < comp.statements.length - 1) {
    // Next statement in same competency
    showStatement(ci, si + 1);
  } else if (ci < COMPETENCIES.length - 1) {
    // Next competency intro
    showCompetencyIntro(ci + 1);
  } else {
    // Done with all statements
    if (isEindmeting) {
      showFeedbackQuestion(0);
    } else {
      showResults();
    }
  }
}

const FEEDBACK_QUESTIONS = [
  {
    text: 'Had je voldoende tijd om de stellingen goed te beantwoorden?',

function getStepForFeedback(qi) {
  let step = 2; // welcome + identify
  for (const comp of COMPETENCIES) {
    step += 1 + comp.statements.length;

  return step + qi;
}

function showFeedbackQuestion(qi) {
  const q = FEEDBACK_QUESTIONS[qi];

  const prevAction = qi === 0
    ? `showStatement(${COMPETENCIES.length - 1}, ${COMPETENCIES[COMPETENCIES.length - 1].statements.length - 1})`

function selectFeedback(qi, optionIdx, el) {
  feedbackAnswers[`q${qi}`] = optionIdx;

/* ── Eindmeting Delta Results ── */
function showDeltaResults(data) {
  const before = data.nulmeting.scores;
  const after = data.eindmeting.scores;
  const overallDelta = after.overall - before.overall;

  // Find biggest growth
  let maxGrowth = { idx: 0, delta: -Infinity };
  for (let i = 0; i < COMPETENCIES.length; i++) {
    const d = after.competencies[i].pct - before.competencies[i].pct;
    if (d > maxGrowth.delta) {
      maxGrowth = { idx: i, delta: d };
    }
  }

  const deltaClass = overallDelta > 0 ? 'positive' : overallDelta < 0 ? 'negative' : 'neutral';
  const deltaSign = overallDelta > 0 ? '+' : '';

  transition(() => {
    let compHTML = '';
    for (let ci = 0; ci < COMPETENCIES.length; ci++) {
      const comp = COMPETENCIES[ci];
      const bScore = before.competencies[ci];
      const aScore = after.competencies[ci];
      const delta = aScore.pct - bScore.pct;
      const dSign = delta > 0 ? '+' : '';
      const dClass = delta > 0 ? 'positive' : delta < 0 ? 'negative' : 'neutral';
      const dLevel = getDeltaLevel(delta);

      compHTML += `
        <div class="comp-delta-result">
          <div class="comp-delta-header">
            <div class="comp-icon" style="background:${comp.color}15">${comp.icon}</div>
            <div class="comp-delta-info">
              <div class="comp-delta-name">${comp.title}</div>
              <div class="comp-delta-module">\u{1F393} Module: ${comp.module}</div>
            </div>
            <div class="comp-delta-badge">
              <span class="delta-badge ${dClass}" style="font-size:.78rem;padding:.25rem .6rem">${dSign}${delta}%</span>
            </div>
          </div>
          <div class="dual-bar-wrap">
            <div class="dual-bar-row">
              <span class="dual-bar-label">Nulmeting</span>
              <div class="dual-bar-track">
                <div class="dual-bar-fill before" style="background:${comp.color}" data-width="${bScore.pct}"></div>
              </div>
              <span class="dual-bar-value" style="color:#999">${bScore.pct}%</span>
            </div>
            <div class="dual-bar-row">
              <span class="dual-bar-label">Eindmeting</span>
              <div class="dual-bar-track">
                <div class="dual-bar-fill" style="background:${comp.color}" data-width="${aScore.pct}"></div>
              </div>
              <span class="dual-bar-value" style="color:${comp.color}">${aScore.pct}%</span>
            </div>
          </div>
          <div class="comp-delta-feedback">
            ${comp.deltaFeedback[dLevel]}
          </div>
        </div>`;
    }

    const growthComp = COMPETENCIES[maxGrowth.idx];

    app.innerHTML = `
      <div class="card hidden">
        <div class="delta-header">
          <div class="logo">CODE<span>-V</span></div>
          <h1>Je groei in beeld</h1>
          <p>${userName.split(' ')[0]}, hier zie je hoe je competenties zich ontwikkeld hebben.</p>
        </div>

        <div class="delta-overall">
          <div class="delta-score-block">
            <div class="delta-score-circle" style="background:linear-gradient(135deg,#8a7aad,#b0a3c0)">
              ${before.overall}%
              <small>voor</small>
            </div>
            <div class="delta-score-label">${before.overallLabel}</div>
          </div>
          <div class="delta-arrow">→</div>
          <div class="delta-score-block">
            <div class="delta-score-circle" style="background:linear-gradient(135deg,var(--aubergine),#4a2d6e)">
              ${after.overall}%
              <small>na</small>
            </div>
            <div class="delta-score-label">${after.overallLabel}</div>
          </div>
          <div class="delta-badge ${deltaClass}" style="font-size:1.1rem">
            ${deltaSign}${overallDelta}%
          </div>
        </div>

        ${compHTML}

        ${maxGrowth.delta > 0 ? `
        <div class="growth-highlight">
          \u{1F31F} <strong>Grootste groei: ${growthComp.title}</strong> (+${maxGrowth.delta}%)
          <br>Dit heb je geleerd in Module: ${growthComp.module}.
        </div>` : ''}

        <div class="saved-notice">
          <span>✅</span>
          Je eindmeting is opgeslagen naast je nulmeting.
          Je kunt dit venster sluiten of de resultaten delen met je leidinggevende.
        </div>

        <div class="cta-section">
          <h3>En nu?</h3>
          <p>Gebruik je groeirapport als basis voor een gesprek met je team of leidinggevende.
          Welke competentie wil je blijven ontwikkelen?</p>
          <a href="https://code-v.org" target="_blank" class="btn btn-cta" rel="noopener">
            Terug naar Code-V →
          </a>
        </div>
      </div>`;

    // Animate bars
    setTimeout(() => {
      document.querySelectorAll('.dual-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    }, 100);
  });
}

/* ══════════════════════════════════════
   INIT
   ══════════════════════════════════════ */
showWelcome();
</script>
</body>
</html>
